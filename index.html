<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 반 배경화면</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Outfit:wght@200;400;700;900&family=Bagel+Fat+One&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    background: #f5f0e8;
    color: #2d2a26;
    user-select: none;
  }

  body.is-dragging * { cursor: grabbing !important; }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 40%, rgba(255, 183, 77, 0.22) 0%, transparent 70%),
      radial-gradient(ellipse 60% 80% at 85% 50%, rgba(129, 212, 250, 0.2) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 50% 90%, rgba(186, 146, 255, 0.12) 0%, transparent 60%);
    z-index: 0;
    animation: bgShift 12s ease-in-out infinite alternate;
  }

  @keyframes bgShift { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.035) 1px, transparent 1px);
    background-size: 28px 28px;
    z-index: 0;
  }

  .left-panel, .right-panel {
    position: relative;
    z-index: 1;
    width: 50%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .left-panel { padding: 3rem; }

  .date-row {
    position: absolute;
    top: 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    animation: fadeSlideUp 1s ease-out 0.2s both;
  }

  .ampm-display {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 6rem;
    color: rgba(59, 130, 246, 0.5);
    margin-right: 0;
    animation: fadeSlideUp 1s ease-out 0.6s both;
  }

  .date-display {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 4.2rem;
    letter-spacing: 0.15em;
    color: rgba(0,0,0,0.55);
  }

  .clock-container { position: relative; animation: fadeSlideUp 1s ease-out 0.4s both; display: flex; align-items: baseline; gap: 2rem; }

  .time-display {
    font-family: 'Outfit', sans-serif;
    font-weight: 900;
    font-size: 9rem;
    line-height: 1;
    letter-spacing: 0.02em;
    background: linear-gradient(135deg, #1a1a2e 0%, #4a4a6a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-variant-numeric: tabular-nums;
  }

  .time-display .colon { animation: colonBlink 1s step-end infinite; display: inline-block; padding: 0 0.05em; position: relative; top: -0.08em; background: linear-gradient(135deg, #1a1a2e 0%, #4a4a6a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  @keyframes colonBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .seconds-display {
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    font-size: 3.5rem;
    color: rgba(59, 130, 246, 0.5);
    margin-top: 0.25rem;
    text-align: right;
    letter-spacing: 0.1em;
    animation: fadeSlideUp 1s ease-out 0.6s both;
  }

  .period-alert {
    position: absolute;
    bottom: 12%;
    padding: 0.8rem 2rem;
    border-radius: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 900;
    font-size: 3rem;
    letter-spacing: 0.05em;
    text-align: center;
    animation: fadeSlideUp 1s ease-out 0.8s both;
    transition: all 0.5s ease;
  }

  .period-alert.in-class {
    background: rgba(59, 130, 246, 0.12);
    color: #3b82f6;
    border: 1.5px solid rgba(59, 130, 246, 0.25);
  }

  .period-alert.break-time {
    background: rgba(16, 185, 129, 0.12);
    color: #10b981;
    border: 1.5px solid rgba(16, 185, 129, 0.25);
  }

  .period-alert.lunch-time {
    background: rgba(249, 115, 22, 0.12);
    color: #f97316;
    border: 1.5px solid rgba(249, 115, 22, 0.25);
  }

  .period-alert.off-time {
    background: rgba(0, 0, 0, 0.05);
    color: rgba(0, 0, 0, 0.35);
    border: 1.5px solid rgba(0, 0, 0, 0.08);
  }

  .day-name {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 3rem;
    color: #e87d3e;
    letter-spacing: 0.15em;
  }

  .clock-glow {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 183, 77, 0.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: -1;
  }

  .divider {
    position: fixed;
    left: 50%; top: 10%;
    height: 80%; width: 2px;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.07) 30%, rgba(0,0,0,0.07) 70%, transparent);
    z-index: 2;
  }

  .right-panel {
    padding: 2.5rem 2.5rem 2.5rem 3rem;
    align-items: flex-start;
    overflow-y: auto;
  }

  .right-panel::-webkit-scrollbar { width: 4px; }
  .right-panel::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

  .rules-header-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    animation: fadeSlideUp 1s ease-out 0.3s both;
  }

  .rules-header {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 3.2rem;
    color: #d94e00;
    -webkit-text-fill-color: #d94e00;
  }

  .edit-toggle-btn {
    margin-left: auto;
    padding: 0.5rem 1.2rem;
    border-radius: 12px;
    border: 1.5px solid rgba(0,0,0,0.1);
    background: rgba(255,255,255,0.5);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: #555;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
  }

  .edit-toggle-btn:hover { background: rgba(255,255,255,0.8); border-color: rgba(0,0,0,0.2); }
  .edit-toggle-btn.active { background: #f97316; color: #fff; border-color: #f97316; }

  .rules-subtitle {
    font-weight: 700;
    font-size: 1.15rem;
    color: rgba(0,0,0,0.4);
    letter-spacing: 0.2em;
    margin-bottom: 2rem;
    animation: fadeSlideUp 1s ease-out 0.5s both;
  }

  #rulesContainer {
    width: 100%;
    position: relative;
  }

  /* === RULE CARD === */
  .rule-card {
    display: flex;
    align-items: flex-start;
    gap: 1.2rem;
    margin-bottom: 1.2rem;
    padding: 1.4rem 1.8rem;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.8);
    box-shadow: 0 4px 20px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
    width: 100%;
    backdrop-filter: blur(12px);
    position: relative;
    transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.3, 1),
                box-shadow 0.35s ease,
                background 0.3s ease,
                opacity 0.3s ease;
    z-index: 1;
  }

  .rule-card:hover {
    background: rgba(255, 255, 255, 0.85);
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
  }

  /* iOS-style wiggle in edit mode */
  .edit-mode .rule-card {
    animation: wiggle 0.35s ease-in-out infinite alternate;
  }

  .edit-mode .rule-card:nth-child(odd)  { animation-delay: 0s; }
  .edit-mode .rule-card:nth-child(even) { animation-delay: 0.18s; }

  @keyframes wiggle {
    0%   { transform: rotate(-0.4deg); }
    100% { transform: rotate(0.4deg); }
  }

  /* Dragging card - lifted state */
  .rule-card.is-lifted {
    z-index: 999;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 8px 20px rgba(0,0,0,0.1);
    background: rgba(255, 255, 255, 0.95);
    transform: scale(1.03) !important;
    animation: none !important;
    pointer-events: none;
    position: fixed;
    width: var(--card-width);
  }

  /* Cards shifting to make room */
  .rule-card.shift-down {
    transform: translateY(calc(var(--card-h) + 1.2rem)) rotate(0deg) !important;
    animation: none !important;
  }

  .rule-card.shift-up {
    transform: translateY(calc(-1 * (var(--card-h) + 1.2rem))) rotate(0deg) !important;
    animation: none !important;
  }

  /* Drop placeholder */
  .drop-placeholder {
    border: 2px dashed rgba(59, 130, 246, 0.35);
    border-radius: 18px;
    background: rgba(59, 130, 246, 0.04);
    margin-bottom: 1.2rem;
    transition: height 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
  }

  .rule-number {
    font-family: 'Outfit', sans-serif;
    font-weight: 900;
    font-size: 2.6rem;
    line-height: 1;
    min-width: 52px;
    text-align: center;
    padding-top: 0.1rem;
  }

  .rule-content { flex: 1; min-width: 0; }

  .rule-title {
    font-weight: 900;
    font-size: 1.65rem;
    margin-bottom: 0.3rem;
    color: #1a1a1a;
    outline: none;
    border-radius: 6px;
    padding: 2px 6px;
    transition: background 0.2s;
  }

  .rule-desc {
    font-weight: 400;
    font-size: 1.1rem;
    color: rgba(0,0,0,0.55);
    line-height: 1.5;
    outline: none;
    border-radius: 6px;
    padding: 2px 6px;
    transition: background 0.2s;
  }

  .edit-mode .rule-title, .edit-mode .rule-desc { background: rgba(255,255,255,0.6); cursor: text; }
  .edit-mode .rule-title:focus, .edit-mode .rule-desc:focus { background: #fff; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }

  .rule-actions {
    display: none;
    flex-direction: column;
    gap: 0.35rem;
    align-items: center;
    padding-top: 0.1rem;
  }

  .edit-mode .rule-actions { display: flex; }

  .action-btn {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: none;
    background: rgba(0,0,0,0.05);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    transition: all 0.2s;
    color: #666;
  }

  .action-btn:hover { background: rgba(0,0,0,0.1); }
  .action-btn.delete-btn:hover { background: #fee2e2; color: #ef4444; }

  .drag-handle {
    display: none;
    cursor: grab;
    color: rgba(0,0,0,0.25);
    font-size: 1.2rem;
    padding: 0.3rem 0.1rem;
    touch-action: none;
    transition: color 0.2s;
  }

  .drag-handle:hover { color: rgba(0,0,0,0.5); }
  .edit-mode .drag-handle { display: block; }

  .number-colors { display: none; gap: 0.25rem; margin-top: 0.5rem; flex-wrap: wrap; justify-content: center; }
  .edit-mode .number-colors { display: flex; }

  .color-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .color-dot:hover { transform: scale(1.25); }
  .color-dot.active { border-color: #2d2a26; }

  .add-rule-btn {
    display: none;
    width: 100%;
    padding: 1rem;
    border-radius: 18px;
    border: 2px dashed rgba(0,0,0,0.12);
    background: transparent;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: rgba(0,0,0,0.3);
    transition: all 0.3s;
    margin-top: 0.5rem;
  }

  .add-rule-btn:hover { border-color: #f97316; color: #f97316; background: rgba(249,115,22,0.04); }
  .edit-mode .add-rule-btn { display: block; }

  /* Particles */
  .particle {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; opacity: 0;
    animation: floatParticle 20s infinite;
  }
  .particle:nth-child(1) { width: 8px; height: 8px; background: rgba(59,130,246,0.25); left: 10%; top: 20%; }
  .particle:nth-child(2) { width: 6px; height: 6px; background: rgba(251,146,60,0.3); left: 85%; top: 15%; animation-delay: -5s; }
  .particle:nth-child(3) { width: 10px; height: 10px; background: rgba(139,92,246,0.18); left: 45%; top: 80%; animation-delay: -10s; }
  .particle:nth-child(4) { width: 7px; height: 7px; background: rgba(16,185,129,0.22); left: 70%; top: 60%; animation-delay: -15s; }
  .particle:nth-child(5) { width: 5px; height: 5px; background: rgba(244,114,182,0.25); left: 30%; top: 70%; animation-delay: -8s; }

  @keyframes floatParticle {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 0.8; }
    50%  { transform: translateY(-120px) translateX(40px); opacity: 0.5; }
    90%  { opacity: 0; }
    100% { transform: translateY(-240px) translateX(-20px); opacity: 0; }
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(25px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .corner-label {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    font-family: 'Outfit', sans-serif; font-weight: 400; font-size: 0.75rem;
    letter-spacing: 0.4em; color: rgba(0,0,0,0.15); text-transform: uppercase; z-index: 3;
  }

  .toast {
    position: fixed; bottom: 3rem; right: 2rem;
    padding: 0.8rem 1.5rem; border-radius: 12px;
    background: #2d2a26; color: #fff; font-size: 0.9rem;
    z-index: 100; opacity: 0; transform: translateY(10px);
    transition: all 0.3s ease; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="particle"></div><div class="particle"></div><div class="particle"></div>
<div class="particle"></div><div class="particle"></div>
<div class="divider"></div>

<div class="left-panel">
  <div class="clock-glow"></div>
  <div class="date-row">
    <div class="date-display" id="dateDisplay"></div>
    <div class="day-name" id="dayName"></div>
  </div>
  <div class="clock-container">
    <div class="ampm-display" id="ampmDisplay">오전</div>
    <div class="time-display" id="timeDisplay">12<span class="colon">:</span>00</div>
  </div>
  <div class="seconds-display" id="secondsDisplay">: 00</div>
  <div class="period-alert off-time" id="periodAlert">수업 전</div>
</div>

<div class="right-panel" id="rightPanel">
  <div class="rules-header-row">
    <div class="rules-header">우리 반 약속</div>
    <button class="edit-toggle-btn" id="editToggle" onclick="toggleEdit()">편집</button>
  </div>
  <div class="rules-subtitle">CLASS RULES</div>
  <div id="rulesContainer"></div>
  <button class="add-rule-btn" id="addRuleBtn" onclick="addRule()">+ 새 규칙 추가</button>
</div>

<div class="toast" id="toast"></div>
<div class="corner-label">Our Classroom</div>

<script>
const COLORS = ['#3b82f6','#8b5cf6','#f97316','#10b981','#ef4444','#ec4899','#14b8a6','#f59e0b'];

const DEFAULT_RULES = [
  { title: '서로 존중하기', desc: '친구의 말에 귀 기울이고, 다름을 인정해요', color: '#3b82f6' },
  { title: '수업에 집중하기', desc: '선생님이 말씀하실 때 경청하고 적극적으로 참여해요', color: '#8b5cf6' },
  { title: '교실을 깨끗하게', desc: '내 자리는 내가 정리하고, 함께 쓰는 공간을 소중히 해요', color: '#f97316' },
  { title: '시간 약속 지키기', desc: '수업 시작 전 자리에 앉고, 정해진 시간을 잘 지켜요', color: '#10b981' },
];

let rules = [];
let isEditing = false;

// === Drag state ===
let drag = {
  active: false,
  cardEl: null,
  index: -1,
  currentIndex: -1,
  startY: 0,
  offsetY: 0,
  cardRects: [],
  cardH: 0,
};

function loadRules() {
  try {
    const s = localStorage.getItem('classroomRules');
    rules = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_RULES));
  } catch { rules = JSON.parse(JSON.stringify(DEFAULT_RULES)); }
}
function saveRules() { localStorage.setItem('classroomRules', JSON.stringify(rules)); }

// =============================================
// RENDER
// =============================================
function renderRules() {
  const container = document.getElementById('rulesContainer');
  container.innerHTML = '';
  document.getElementById('rightPanel').classList.toggle('edit-mode', isEditing);

  rules.forEach((rule, i) => {
    const card = document.createElement('div');
    card.className = 'rule-card';
    card.dataset.index = i;

    // Drag handle
    const handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.innerHTML = '⠿';
    handle.addEventListener('pointerdown', e => startDrag(e, i, card));

    // Number + palette
    const numWrap = document.createElement('div');
    numWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;';
    const num = document.createElement('div');
    num.className = 'rule-number';
    num.style.color = rule.color || COLORS[i % COLORS.length];
    num.textContent = String(i + 1).padStart(2, '0');
    numWrap.appendChild(num);

    const palette = document.createElement('div');
    palette.className = 'number-colors';
    COLORS.forEach(c => {
      const dot = document.createElement('div');
      dot.className = 'color-dot' + (c === rule.color ? ' active' : '');
      dot.style.background = c;
      dot.onclick = () => { rules[i].color = c; saveRules(); renderRules(); };
      palette.appendChild(dot);
    });
    numWrap.appendChild(palette);

    // Content
    const content = document.createElement('div');
    content.className = 'rule-content';

    const title = document.createElement('div');
    title.className = 'rule-title';
    title.textContent = rule.title;
    title.contentEditable = isEditing;
    title.spellcheck = false;
    title.addEventListener('blur', () => { rules[i].title = title.textContent.trim() || '새 규칙'; saveRules(); });
    title.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); title.blur(); } });

    const desc = document.createElement('div');
    desc.className = 'rule-desc';
    desc.textContent = rule.desc;
    desc.contentEditable = isEditing;
    desc.spellcheck = false;
    desc.addEventListener('blur', () => { rules[i].desc = desc.textContent.trim(); saveRules(); });
    desc.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); desc.blur(); } });

    content.appendChild(title);
    content.appendChild(desc);

    // Actions (only delete now, reorder via drag)
    const actions = document.createElement('div');
    actions.className = 'rule-actions';

    const delBtn = document.createElement('button');
    delBtn.className = 'action-btn delete-btn';
    delBtn.innerHTML = '✕';
    delBtn.onclick = () => {
      card.style.transition = 'transform 0.3s, opacity 0.3s';
      card.style.transform = 'scale(0.8)';
      card.style.opacity = '0';
      setTimeout(() => { rules.splice(i, 1); saveRules(); renderRules(); showToast('규칙이 삭제되었어요'); }, 250);
    };
    actions.appendChild(delBtn);

    card.appendChild(handle);
    card.appendChild(numWrap);
    card.appendChild(content);
    card.appendChild(actions);
    container.appendChild(card);
  });
}

// =============================================
// DRAG & DROP (pointer-based, iOS-style)
// =============================================
function startDrag(e, index, cardEl) {
  if (!isEditing) return;
  e.preventDefault();

  const container = document.getElementById('rulesContainer');
  const cards = [...container.querySelectorAll('.rule-card')];
  const rect = cardEl.getBoundingClientRect();
  const containerRect = container.getBoundingClientRect();

  // Measure all card positions
  const rects = cards.map(c => c.getBoundingClientRect());
  const cardH = rect.height;

  drag = {
    active: true,
    cardEl,
    index,
    currentIndex: index,
    startY: e.clientY,
    offsetY: e.clientY - rect.top,
    cardRects: rects,
    cardH,
    containerTop: containerRect.top,
    cards,
  };

  // Lift the card
  cardEl.classList.add('is-lifted');
  cardEl.style.setProperty('--card-width', rect.width + 'px');
  cardEl.style.left = rect.left + 'px';
  cardEl.style.top = (e.clientY - drag.offsetY) + 'px';

  // Set CSS var for shift distance
  cards.forEach(c => c.style.setProperty('--card-h', cardH + 'px'));

  document.body.classList.add('is-dragging');

  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
}

function onDragMove(e) {
  if (!drag.active) return;

  const { cardEl, offsetY, index, cards, cardRects, cardH } = drag;

  // Move lifted card to cursor
  cardEl.style.top = (e.clientY - offsetY) + 'px';

  // Determine which index the card is hovering over
  const centerY = e.clientY - offsetY + cardH / 2;
  let newIndex = index;

  for (let i = 0; i < cardRects.length; i++) {
    const r = cardRects[i];
    const midY = r.top + r.height / 2;
    if (i < index && centerY < midY) { newIndex = i; break; }
    if (i > index && centerY > midY) { newIndex = i; }
  }

  if (newIndex !== drag.currentIndex) {
    drag.currentIndex = newIndex;

    // Shift other cards
    cards.forEach((c, i) => {
      if (i === index) return;
      c.classList.remove('shift-down', 'shift-up');

      if (index < newIndex) {
        // Dragging down: cards between original & new shift up
        if (i > index && i <= newIndex) c.classList.add('shift-up');
      } else if (index > newIndex) {
        // Dragging up: cards between new & original shift down
        if (i >= newIndex && i < index) c.classList.add('shift-down');
      }
    });
  }
}

function onDragEnd() {
  if (!drag.active) return;

  const { cardEl, index, currentIndex, cards } = drag;

  // Remove visual states
  cardEl.classList.remove('is-lifted');
  cardEl.style.cssText = '';
  cards.forEach(c => { c.classList.remove('shift-down', 'shift-up'); c.style.removeProperty('--card-h'); });
  document.body.classList.remove('is-dragging');

  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);

  // Apply reorder if changed
  if (index !== currentIndex) {
    const moved = rules.splice(index, 1)[0];
    rules.splice(currentIndex, 0, moved);
    saveRules();
    showToast('순서가 변경되었어요');
  }

  drag.active = false;
  renderRules();
}

// =============================================
// ADD / TOGGLE / TOAST
// =============================================
function addRule() {
  rules.push({ title: '새 규칙', desc: '설명을 입력하세요', color: COLORS[rules.length % COLORS.length] });
  saveRules(); renderRules();
  showToast('새 규칙이 추가되었어요');
  setTimeout(() => {
    const titles = document.querySelectorAll('.rule-title');
    const last = titles[titles.length - 1];
    if (last) { last.focus(); document.execCommand('selectAll', false, null); }
  }, 100);
}

function toggleEdit() {
  isEditing = !isEditing;
  const btn = document.getElementById('editToggle');
  btn.textContent = isEditing ? '완료' : '편집';
  btn.classList.toggle('active', isEditing);
  renderRules();
  if (!isEditing) showToast('저장되었어요 ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

// Clock
const DAYS_KR = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

// Timetable: [start_hour, start_min, end_hour, end_min, label, type]
// 6교시 is Tuesday only (day === 2)
const TIMETABLE = [
  [9,  0,  9, 40, '1교시', 'in-class'],
  [9, 50, 10, 30, '2교시', 'in-class'],
  [10, 40, 11, 20, '3교시', 'in-class'],
  [11, 30, 12, 10, '4교시', 'in-class'],
  [12, 10, 13,  0, '점심시간', 'lunch-time'],
  [13,  0, 13, 40, '5교시', 'in-class'],
  [13, 50, 14, 30, '6교시', 'in-class'],  // Tuesday only
];

function getCurrentPeriod(now) {
  const day = now.getDay(); // 0=Sun, 2=Tue
  const mins = now.getHours() * 60 + now.getMinutes();
  const isWeekend = (day === 0 || day === 6);

  if (isWeekend) return { label: '주말', type: 'off-time' };

  for (let i = 0; i < TIMETABLE.length; i++) {
    const [sh, sm, eh, em, label, type] = TIMETABLE[i];
    const start = sh * 60 + sm;
    const end = eh * 60 + em;

    // Skip 6교시 on non-Tuesday
    if (label === '6교시' && day !== 2) continue;

    if (mins >= start && mins < end) return { label, type };

    // Check break time between this period and next
    if (mins >= end) {
      const next = TIMETABLE[i + 1];
      if (next) {
        // Skip 6교시 on non-Tuesday for next period check
        if (next[4] === '6교시' && day !== 2) continue;
        const nextStart = next[0] * 60 + next[1];
        if (mins < nextStart) return { label: '쉬는 시간', type: 'break-time' };
      }
    }
  }

  // Before or after school
  const firstStart = 9 * 60;
  const lastPeriod = (day === 2) ? TIMETABLE[6] : TIMETABLE[5];
  const lastEnd = lastPeriod[2] * 60 + lastPeriod[3];

  if (mins < firstStart) return { label: '수업 전', type: 'off-time' };
  if (mins >= lastEnd) return { label: '수업 끝', type: 'off-time' };

  return { label: '수업 전', type: 'off-time' };
}

function updateClock() {
  const n = new Date();
  let h = n.getHours();
  const ampm = h < 12 ? '오전' : '오후';
  h = h % 12 || 12;
  document.getElementById('timeDisplay').innerHTML =
    `${h}<span class="colon">:</span>${String(n.getMinutes()).padStart(2,'0')}`;
  document.getElementById('ampmDisplay').textContent = ampm;
  document.getElementById('secondsDisplay').textContent = `: ${String(n.getSeconds()).padStart(2,'0')}`;
  document.getElementById('dateDisplay').textContent =
    `${n.getFullYear()}. ${String(n.getMonth()+1).padStart(2,'0')}. ${String(n.getDate()).padStart(2,'0')}`;
  document.getElementById('dayName').textContent = DAYS_KR[n.getDay()];

  // Update period alert
  const period = getCurrentPeriod(n);
  const alertEl = document.getElementById('periodAlert');
  alertEl.textContent = period.label;
  alertEl.className = 'period-alert ' + period.type;
}

loadRules(); renderRules(); updateClock();
setInterval(updateClock, 1000);
</script>
